name: Deploy VHL Import to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 77.37.122.252
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            
            echo "=== Starting VHL Import deployment ==="
            
            # Create directory if it doesn't exist
            mkdir -p /var/www/vhlimport
            cd /var/www/vhlimport

            # Backup backend env so it never gets lost during git operations
            ENV_BACKUP_PATH="/tmp/vhlimport_backend.env"
            if [ -f backend/.env ]; then
              echo "=== Backing up backend/.env ==="
              cp backend/.env "$ENV_BACKUP_PATH"
            fi
            
            echo "=== Syncing with repository ==="
            # Initialize git repo if not exists, otherwise fetch and reset
            if [ ! -d ".git" ]; then
              echo "Initializing git repository..."
              git init
              git remote add origin git@github-vhlimport:${{ github.repository }}.git
            fi
            
            git fetch origin main
            git reset --hard origin/main

            # Restore env after reset/clean (belt + suspenders)
            if [ -f "$ENV_BACKUP_PATH" ]; then
              echo "=== Restoring backend/.env ==="
              mkdir -p backend
              cp "$ENV_BACKUP_PATH" backend/.env
            fi

            # Clean untracked files but preserve env files
            git clean -fd -e backend/.env -e backend/.env.*

            # Fail fast if env is missing / misconfigured (prevents SASL SCRAM errors)
            if [ ! -f backend/.env ]; then
              echo "ERROR: backend/.env is missing on the server. Create /var/www/vhlimport/backend/.env and re-run." >&2
              exit 1
            fi
            if ! grep -q '^DB_PASSWORD=\(.\+\)$' backend/.env; then
              echo "ERROR: DB_PASSWORD is missing or empty in backend/.env. Set it and re-run." >&2
              exit 1
            fi
            
            echo "=== Building frontend ==="
            npm install --legacy-peer-deps
            npm run build
            
            echo "=== Building backend ==="
            cd backend
            rm -rf dist node_modules
            npm install --legacy-peer-deps
            npm run build
            
            echo "=== Running database migrations ==="
            npm run migration:run
            
            echo "=== Restarting API ==="
            pm2 delete vhlimport-api 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save
            
            echo "=== Deployment complete ==="
            pm2 list
