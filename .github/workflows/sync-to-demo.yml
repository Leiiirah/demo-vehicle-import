name: Sync to demo repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add destination remote
        env:
          DEMO_REPO_TOKEN: ${{ secrets.DEMO_REPO_TOKEN }}
        run: |
          git remote add destination "https://x-access-token:${DEMO_REPO_TOKEN}@github.com/avalonlabsteam/demo-vehicle-import.git"

      - name: Force push to destination main
        run: |
          git push --force destination HEAD:main